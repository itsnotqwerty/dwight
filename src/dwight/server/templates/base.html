<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dwight AI{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous">
  <style>
    body { background-color: #0d1117; }
    .navbar-brand { font-weight: 700; letter-spacing: .05em; }
    pre.live-output {
      min-height: 12rem;
      max-height: 32rem;
      overflow-y: auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0 0 .375rem .375rem;
      padding: 1rem;
      font-size: .8125rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-2">
  <div class="container">
    <a class="navbar-brand text-info" href="/">&#x2726; Dwight AI</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarLinks"
      aria-controls="navbarLinks"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarLinks">
      <div class="navbar-nav ms-auto gap-1">
        <a class="nav-link {% block nav_generate %}{% endblock %}" href="/">Generate</a>
        <a class="nav-link {% block nav_train %}{% endblock %}" href="/train">Training</a>
      </div>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
